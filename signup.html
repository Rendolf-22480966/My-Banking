<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Choice Credit Union — Open an Account</title>
    <link rel="stylesheet" href="public.css">
    <script src="Bank.js"></script>
</head>
<body class="pub-page">

    <header class="pub-header">
        <div class="pub-header-left">
            <a class="pub-logo" href="index.html">
                <img src="logo.svg" alt="">
                <span>FCCU</span>
            </a>
        </div>
        <a class="pub-signin" href="login.html">Sign in</a>
    </header>

    <main class="su-wrap">
        <div class="su-progress" id="suProgress"></div>
        <div class="su-card">
            <h1 id="suTitle">Let’s get started</h1>
            <p class="sub" id="suSub">Opening an account takes a few minutes. Have your ID and Social Security number ready.</p>
            <p class="su-error" id="suError"></p>
            <div id="suBody"></div>
            <div class="su-actions" id="suActions"></div>
        </div>
        <p style="text-align:center;margin-top:18px;font-size:0.85rem;color:#64748b">
            Already a member? <a href="login.html" style="color:#0b5cab;font-weight:700">Sign in</a>
        </p>
    </main>

    <script src="signup.js"></script>
</body>
</html>
