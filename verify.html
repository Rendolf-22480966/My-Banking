<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Choice Credit Union — Security Verification</title>
    <link rel="stylesheet" href="public.css">
    <link rel="stylesheet" href="verify.css">
    <script src="Bank.js"></script>
</head>
<body class="vf-live-page">
    <div class="vf-shell">
        <div class="vf-live-card">
            <div class="vf-live-top">
                <img src="logo.svg" alt="" width="36" height="36">
                <div>
                    <p class="vf-brand">First Choice Credit Union</p>
                    <p class="vf-secure">Security verification</p>
                </div>
                <button type="button" class="vf-refresh" id="vfRefresh" title="New challenge">↻</button>
            </div>

            <div class="vf-live-pulse" id="vfPulse"><span></span> Live challenge · refreshes each visit</div>

            <h1 id="vfTitle">Confirm you’re human</h1>
            <p class="vf-live-sub" id="vfSub">Complete the challenge below to continue.</p>

            <div id="vfStage" class="vf-stage"></div>
            <p class="vf-err" id="vfError"></p>

            <button type="button" class="vf-primary" id="vfSubmit">Verify and continue</button>
            <button type="button" class="vf-secondary" id="vfNewChallenge">Try a different challenge</button>
        </div>
    </div>
    <script src="verify.js"></script>
</body>
</html>
